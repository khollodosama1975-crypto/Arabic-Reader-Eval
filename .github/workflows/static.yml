name: Deploy Vite Site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Project
        run: pnpm run build
        continue-on-error: true

      - name: Fallback Build if needed
        run: |
          if [ ! -d "artifacts/reading-assessment/dist/public" ]; then
            cd artifacts/reading-assessment && pnpm install && pnpm run build
          fi

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # قراءة المجلد الصحيح الذي يحتوي على ملف index.html الجاهز
          path: './artifacts/reading-assessment/dist/public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
